name: PR Preview

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Determine Base URL Prefix
        id: base_url
        run: |
          if [ -f CNAME ] && [ "${{ github.repository_owner }}" = "mume" ]; then
            echo "prefix=/" >> $GITHUB_OUTPUT
            echo "host=$(cat CNAME)" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.repository.name }}" = "${{ github.repository_owner }}.github.io" ]; then
            echo "prefix=/" >> $GITHUB_OUTPUT
            echo "host=${{ github.repository_owner }}.github.io" >> $GITHUB_OUTPUT
          else
            echo "prefix=/${{ github.event.repository.name }}/" >> $GITHUB_OUTPUT
            echo "host=${{ github.repository_owner }}.github.io" >> $GITHUB_OUTPUT
          fi

      - name: Setup environment
        run: ./scripts/ci-env.sh
        env:
          PREVIEW_HOST: ${{ steps.base_url.outputs.host }}
          PREVIEW_PREFIX: ${{ steps.base_url.outputs.prefix }}pr-${{ github.event.number }}/

      - name: Build preview
        run: npm run build
        env:
          VITE_BASE: ${{ steps.base_url.outputs.prefix }}pr-${{ github.event.number }}/

      - name: Package build
        run: |
          cd dist
          zip -r ../pr-${{ github.event.number }}.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-${{ github.event.number }}
          path: pr-${{ github.event.number }}.zip
          retention-days: 30
