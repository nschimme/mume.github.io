services:
  # Development server with live reload
  dev:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm ci && npm run dev -- --host"
    ports:
      - "5173:5173"

  # Production build served via nginx (mirrors deployment)
  community:
    build:
      context: .
      args:
        VITE_BASE: /
    ports:
      - "4174:80"
